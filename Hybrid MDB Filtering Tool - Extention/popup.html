<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>MDB Filtering Tool</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <h1>MDB Filtering Tool</h1>
            </div>
        </header>

        <section id="keyword-filtering">
            <div class="section-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                <h2>Filtering Methods</h2>
            </div>
            
            <div class="settings-group">
                <div class="setting-row">
                    <div class="setting-label">
                        <label for="filter-toggle">Rule-Based Filtering</label>
                        <span class="label-desc">Regex/Keyword scan</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="filter-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div class="setting-label">
                        <label for="ai-filter-toggle">AI Classification</label>
                        <span class="label-desc">Naïve Bayes Analysis</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="ai-filter-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </section>

        <section id="ui-settings">
            <div class="section-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <h2>Visual Settings</h2>
            </div>
            <div class="setting-row">
                <div class="setting-label">
                    <label for="highlight-toggle">Highlight Noise</label>
                    <span class="label-desc">Visual indicators on MDB</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="highlight-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </section>

        <section id="keyword-management">
            <div class="section-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2>Manage Keywords</h2>
            </div>
            <div class="add-keyword">
                <input type="text" id="keyword-input" placeholder="Type keyword or regex...">
                <button id="add-keyword-btn">Add</button>
            </div>
            <ul id="keyword-list">
                <!-- Keywords will be dynamically inserted here -->
            </ul>
        </section>

        <section id="dashboard-export">
            <div class="section-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                <h2>Data & Insights</h2>
            </div>
            <div class="action-buttons">
                <button id="view-dashboard-btn" class="btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    User Dashboard
                </button>
                <button id="export-csv-btn" class="btn-outline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export Academic (CSV)
                </button>
            </div>
        </section>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="popup.js"></script>
</body>
</html>
